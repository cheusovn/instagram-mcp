name: 🚀 Render + Publish Instagram

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: 'Какой пост публиковать'
        required: true
        default: 'post_01'
        type: choice
        options:
          - post_01
          - post_02
          - post_03
          - post_04
          - post_05
          - post_06
          - post_07
          - post_08
          - post_09
      composition:
        description: 'Remotion composition'
        required: false
        default: 'StyleA-NeonKatana'
        type: choice
        options:
          - StyleA-NeonKatana
          - StyleB-GlassMinimal
          - StyleC-GoldRush
          - Style03-BrutalistNeon
          - Style01-Bebas3D
          - Style02-CandyPop
          - Style04-Glassmorphism
          - Style05-LiquidBlobs
          - Style06-RetroVHS
          - Style07-SwissBold
      max_slides:
        description: 'Кол-во слайдов (0 = все, 1 = тест)'
        required: false
        default: '0'
        type: string

jobs:
  render-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    env:
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
      INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      COMPOSITION_ID: ${{ inputs.composition }}
      POST_ID: ${{ inputs.post_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps (Chrome + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libcairo2 libpangocairo-1.0-0 \
            ffmpeg fonts-liberation
          echo "✅ Системные зависимости установлены"
          ffmpeg -version | head -1

      - name: Install Remotion dependencies
        working-directory: remotion-carousel
        run: |
          npm install
          echo "✅ npm install завершён"

      - name: Show slides content
        run: |
          echo "📋 Содержимое slides.json:"
          cat remotion-carousel/src/slides.json

      - name: 📦 Prepare post slides
        run: |
          echo "Подготавливаю слайды для ${{ inputs.post_id }}..."
          node prepare-post.mjs ${{ inputs.post_id }}

      - name: 🖼 Generate AI backgrounds (OpenRouter)
        working-directory: remotion-carousel
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          STYLE_ID: ${{ inputs.composition }}
        run: |
          # Map composition ID to background style bank
          case "${{ inputs.composition }}" in
            StyleA-NeonKatana) BG_STYLE="StyleA-NeonKatana" ;;
            StyleB-GlassMinimal) BG_STYLE="StyleB-GlassMinimal" ;;
            StyleC-GoldRush) BG_STYLE="StyleC-GoldRush" ;;
            Style03-BrutalistNeon) BG_STYLE="StyleA-NeonKatana" ;;
            Style04-Glassmorphism) BG_STYLE="StyleB-GlassMinimal" ;;
            Style01-Bebas3D) BG_STYLE="StyleC-GoldRush" ;;
            *) BG_STYLE="StyleA-NeonKatana" ;;
          esac
          echo "🎨 Генерирую AI-фоны для стиля: ${BG_STYLE}"
          node generate-backgrounds.mjs --style=${BG_STYLE}

      - name: 🎵 Generate SFX (cyberpunk sound effects)
        working-directory: remotion-carousel
        run: |
          echo "Генерирую звуковые эффекты через ffmpeg..."
          node generate-sfx.mjs
          echo "✅ SFX готовы:"
          ls -lh public/sfx/

      - name: 🎬 Render individual slides (CPU)
        working-directory: remotion-carousel
        env:
          COMPOSITION_ID: ${{ inputs.composition }}
        run: |
          echo "═══════════════════════════════════════════"
          echo "  🎬 Рендерю: ${{ inputs.composition }}"
          echo "  📊 CPU рендер — займёт 15-30 минут"
          echo "═══════════════════════════════════════════"
          MAX_SLIDES=${{ inputs.max_slides || 0 }} node render-slides.mjs '${{ inputs.composition }}' --slides-only
          echo ""
          echo "✅ Слайды готовы:"
          ls -lh ../out/slides/

      - name: 🔗 Assemble carousel with ffmpeg
        run: |
          echo "🔗 Собираю carousel..."
          ls "$(pwd)/out/slides/slide_"*.mp4 | sort | awk '{print "file \x27" $0 "\x27"}' > out/concat.txt
          cat out/concat.txt

          ffmpeg -y -f concat -safe 0 -i out/concat.txt \
            -c:v libx264 -preset medium -crf 20 -movflags +faststart \
            -vf "scale=1080:1350" \
            out/carousel_full.mp4

          SIZE=$(du -sh out/carousel_full.mp4 | cut -f1)
          echo "✅ carousel_full.mp4 — ${SIZE}"

      - name: 📦 Upload to GitHub Releases
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          TAG="content-${{ inputs.post_id }}-${TIMESTAMP}"
          FILENAME="${{ inputs.post_id }}_${TIMESTAMP}.mp4"

          cp out/carousel_full.mp4 "/tmp/${FILENAME}"

          gh release create "${TAG}" \
            --repo cheusovn/instagram-mcp \
            --title "📱 ${{ inputs.post_id }} — $(date '+%d.%m.%Y %H:%M') MSK" \
            --notes "Composition: ${{ inputs.composition }} | CPU render" \
            "/tmp/${FILENAME}"

          VIDEO_URL="https://github.com/cheusovn/instagram-mcp/releases/download/${TAG}/${FILENAME}"
          echo "video_url=${VIDEO_URL}" >> $GITHUB_OUTPUT
          echo "✅ Загружено: ${VIDEO_URL}"

      - name: ⏳ Ждём CDN GitHub (30 сек)
        run: |
          echo "Ждём пока GitHub CDN индексирует файл..."
          sleep 30
          echo "✅ Готово"

      - name: 📱 Publish to Instagram
        run: |
          echo "📱 Публикуем в Instagram..."
          VIDEO_URL="${{ steps.upload.outputs.video_url }}"
          node publish-instagram.mjs \
            --post "content/posts/${{ inputs.post_id }}.json" \
            --video "${VIDEO_URL}"

      - name: 💾 Commit publish log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Content Bot 🤖"
          git config user.email "bot@cheusov.ru"
          git add content/published.json 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "📱 published: ${{ inputs.post_id }} → Instagram $(date '+%d.%m.%Y %H:%M')"
          git push || true

      - name: ✅ Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║  ✅ ГОТОВО! Пост опубликован             ║"
          echo "║  Пост:  ${{ inputs.post_id }}                      ║"
          echo "║  Стиль: ${{ inputs.composition }}   ║"
          echo "║  Время: $(date '+%d.%m.%Y %H:%M') UTC         ║"
          echo "║  @nikolay_cheusov                        ║"
          echo "╚══════════════════════════════════════════╝"
