name: Competitor Analysis

on:
  workflow_dispatch:

jobs:
  analyze-competitors:
    runs-on: ubuntu-latest
    steps:
      - name: Analyze Competitors via Hashtags
        run: |
          TOKEN="${{ secrets.INSTAGRAM_ACCESS_TOKEN }}"

          # Get page token and IG ID
          PAGES=$(curl -s "https://graph.facebook.com/me/accounts?access_token=$TOKEN")
          PAGE_TOKEN=$(echo "$PAGES" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data'][0]['access_token'])")
          IG_ID=$(curl -s "https://graph.facebook.com/$(echo "$PAGES" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data'][0]['id'])")?fields=instagram_business_account&access_token=$PAGE_TOKEN" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['instagram_business_account']['id'])")

          echo "════════════════════════════════════════════"
          echo "     🔍 АНАЛИЗ КОНКУРЕНТОВ В НИШЕ ИИ"
          echo "════════════════════════════════════════════"

          # Hashtags to analyze
          HASHTAGS="нейросети ии_видео искусственныйинтеллект aiвидео нейросеть midjourney sora runwayml kling нейросетидляработы"

          for TAG in $HASHTAGS; do
            echo ""
            echo "🏷  #$TAG"
            echo "──────────────────────────────────────────"

            # Search hashtag ID
            HTAG_RESP=$(curl -s "https://graph.facebook.com/ig_hashtag_search?user_id=$IG_ID&q=$TAG&access_token=$PAGE_TOKEN")
            HTAG_ID=$(echo "$HTAG_RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          ids=d.get('data',[])
          print(ids[0]['id'] if ids else '')
          " 2>/dev/null)

            if [ -z "$HTAG_ID" ]; then
              echo "  ⚠️ Хештег не найден"
              continue
            fi

            # Get top posts for hashtag
            TOP=$(curl -s "https://graph.facebook.com/$HTAG_ID/top_media?user_id=$IG_ID&fields=id,caption,like_count,comments_count,media_type,timestamp,permalink,username&access_token=$PAGE_TOKEN")
            echo "$TOP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          posts=d.get('data',[])
          if not posts:
              print('  Нет данных')
              sys.exit(0)
          print(f'  Топ {len(posts)} постов:')
          for p in posts[:5]:
              username = p.get('username','???')
              likes = p.get('like_count',0)
              comments = p.get('comments_count',0)
              mtype = p.get('media_type','?')
              date = p.get('timestamp','')[:10]
              caption = (p.get('caption','') or '')[:60]
              icon = {'IMAGE':'🖼','VIDEO':'🎬','CAROUSEL_ALBUM':'📑'}.get(mtype,'?')
              print(f'  {icon} @{username}')
              print(f'     ❤️ {likes:,}  💬 {comments:,}  📅 {date}')
              print(f'     {caption}')
          " 2>/dev/null || echo "  ⚠️ Ошибка получения данных"

            sleep 1
          done

          echo ""
          echo "════════════════════════════════════════════"
          echo "     📊 АНАЛИЗ КОНКРЕТНЫХ КОНКУРЕНТОВ"
          echo "════════════════════════════════════════════"

          # Known competitors in Russian AI/neural networks niche
          COMPETITORS="ai_abyss neuro_style_art neural_style_transfer_art ai_art_gallery midjourney_art_official"

          for USERNAME in $COMPETITORS; do
            echo ""
            echo "👤 @$USERNAME"
            echo "──────────────────────────────────────────"

            RESP=$(curl -s "https://graph.facebook.com/$IG_ID?fields=business_discovery.fields(username,name,biography,followers_count,media_count,website)&business_discovery_username=$USERNAME&access_token=$PAGE_TOKEN" 2>/dev/null || echo "{}")

            echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          bd=d.get('business_discovery',{})
          if not bd or 'error' in d:
              err=d.get('error',{}).get('message','Нет доступа (приватный или не бизнес аккаунт)')
              print(f'  ⚠️ {err[:80]}')
              sys.exit(0)
          print(f\"  Имя:         {bd.get('name','N/A')}\")
          print(f\"  Подписчики:  {bd.get('followers_count',0):,}\")
          print(f\"  Постов:      {bd.get('media_count',0):,}\")
          print(f\"  Биография:   {(bd.get('biography','') or '')[:80]}\")
          print(f\"  Сайт:        {bd.get('website','N/A')}\")
          " 2>/dev/null

            sleep 1
          done

          echo ""
          echo "════════════════════════════════════════════"
          echo "💡 РЕКОМЕНДАЦИИ:"
          echo "  1. Добавьте username конкурентов вручную в список COMPETITORS"
          echo "  2. Хештеги с наибольшим числом лайков = ваши приоритетные теги"
          echo "  3. Смотрите на тип контента (видео vs карусели) у топ-постов"
          echo "════════════════════════════════════════════"
