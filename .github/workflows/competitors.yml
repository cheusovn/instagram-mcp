name: Competitor Analysis

on:
  workflow_dispatch:

jobs:
  analyze-competitors:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
    steps:
      - name: Analyze Competitors in AI niche
        run: |
          python3 << 'PYEOF'
          import json, time, urllib.request, urllib.parse, os

          TOKEN = os.environ["TOKEN"]

          def api(path, params={}):
              params["access_token"] = TOKEN
              url = f"https://graph.facebook.com/{path}?{urllib.parse.urlencode(params)}"
              try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  return {"error": {"message": str(e)}}

          # Setup
          pages = api("me/accounts")
          page = pages["data"][0]
          page_token = page["access_token"]
          page_id = page["id"]

          ig_data = api(page_id, {"fields": "instagram_business_account", "access_token": page_token})
          IG_ID = ig_data["instagram_business_account"]["id"]

          TOKEN = page_token  # use page token from now on

          def api2(path, params={}):
              params["access_token"] = TOKEN
              url = f"https://graph.facebook.com/{path}?{urllib.parse.urlencode(params)}"
              try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  return {"error": {"message": str(e)}}

          print("═" * 50)
          print("    🔍 АНАЛИЗ КОНКУРЕНТОВ В НИШЕ ИИ")
          print("═" * 50)

          # Hashtags to analyze
          hashtags = [
              "нейросети", "нейросеть", "искусственныйинтеллект",
              "ИИвидео", "midjourney", "kling", "runwayml",
              "sora", "aiart", "нейросетидляработы"
          ]

          print("\n📊 АНАЛИЗ ХЕШТЕГОВ")
          print("─" * 50)

          for tag in hashtags:
              print(f"\n🏷  #{tag}")
              resp = api2("ig_hashtag_search", {"user_id": IG_ID, "q": tag})
              ids = resp.get("data", [])
              if not ids:
                  err = resp.get("error", {}).get("message", "не найден")
                  print(f"  ⚠️  {err[:70]}")
                  time.sleep(0.5)
                  continue

              htag_id = ids[0]["id"]
              top = api2(f"{htag_id}/top_media", {
                  "user_id": IG_ID,
                  "fields": "id,like_count,comments_count,media_type,timestamp,permalink"
              })
              posts = top.get("data", [])
              if not posts:
                  print("  Нет топ-постов")
              else:
                  total_likes = sum(p.get("like_count", 0) for p in posts)
                  avg_likes = total_likes / len(posts)
                  print(f"  Постов в топе: {len(posts)}  |  Среднее лайков: {avg_likes:.0f}")
                  best = max(posts, key=lambda x: x.get("like_count", 0))
                  icon = {"IMAGE": "🖼", "VIDEO": "🎬", "CAROUSEL_ALBUM": "📑"}.get(best.get("media_type", ""), "?")
                  print(f"  Лучший: {icon} ❤️ {best.get('like_count', 0):,}  💬 {best.get('comments_count', 0):,}  📅 {best.get('timestamp', '')[:10]}")
                  print(f"  🔗 {best.get('permalink', '')}")
              time.sleep(0.5)

          print("\n")
          print("═" * 50)
          print("    👥 АНАЛИЗ КОНКУРЕНТОВ ПО USERNAME")
          print("═" * 50)

          # Russian AI/video niche competitors — edit this list!
          competitors = [
              "ai.neuroscience",
              "neural_dream_art",
              "midjourney_russia",
              "sora_ai_video",
              "kling_ai_ru",
              "ai_video_creation",
              "нейросети_гайды",
          ]

          for username in competitors:
              print(f"\n👤 @{username}")
              resp = api2(IG_ID, {
                  "fields": "business_discovery.fields(username,name,biography,followers_count,media_count,website)",
                  "business_discovery_username": username
              })
              bd = resp.get("business_discovery", {})
              if not bd or "error" in resp:
                  err = resp.get("error", {}).get("message", "нет доступа")
                  print(f"  ⚠️  {err[:80]}")
              else:
                  print(f"  Имя:        {bd.get('name', 'N/A')}")
                  print(f"  Подписчики: {bd.get('followers_count', 0):,}")
                  print(f"  Постов:     {bd.get('media_count', 0):,}")
                  bio = (bd.get("biography", "") or "")[:80]
                  print(f"  Биография:  {bio}")
                  print(f"  Сайт:       {bd.get('website', 'N/A')}")
              time.sleep(0.5)

          print("\n")
          print("═" * 50)
          print("💡 СОВЕТ: Чтобы добавить своих конкурентов,")
          print("   отредактируйте список competitors в workflow")
          print("═" * 50)
          PYEOF
