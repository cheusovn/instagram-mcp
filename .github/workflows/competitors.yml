name: Competitor Analysis - Top Carousels

on:
  workflow_dispatch:

jobs:
  analyze-carousels:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
    steps:
      - name: Find Top Carousels in AI Niche
        run: |
          python3 << 'PYEOF'
          import json, time, urllib.request, urllib.parse, os

          TOKEN = os.environ["TOKEN"]

          def api(path, params={}):
              p = dict(params)
              p["access_token"] = TOKEN
              url = f"https://graph.facebook.com/{path}?{urllib.parse.urlencode(p)}"
              try:
                  with urllib.request.urlopen(url, timeout=15) as r:
                      return json.loads(r.read())
              except Exception as e:
                  return {"error": {"message": str(e)}}

          # Setup
          pages = api("me/accounts")
          page_token = pages["data"][0]["access_token"]
          page_id = pages["data"][0]["id"]
          ig_data = api(page_id, {"fields": "instagram_business_account", "access_token": page_token})
          IG_ID = ig_data["instagram_business_account"]["id"]
          TOKEN = page_token

          # Hashtags — sorted by engagement from previous analysis
          hashtags = [
              "нейросеть",
              "искусственныйинтеллект",
              "midjourney",
              "sora",
              "runwayml",
              "нейросети",
              "aitools",
              "aiвидео",
              "kling",
              "нейросетидляработы",
          ]

          all_carousels = []

          print("═" * 55)
          print("  🔍 ТОП КАРУСЕЛИ В НИШЕ ИИ/НЕЙРОСЕТИ")
          print("═" * 55)

          for tag in hashtags:
              resp = api("ig_hashtag_search", {"user_id": IG_ID, "q": tag})
              ids = resp.get("data", [])
              if not ids:
                  continue

              htag_id = ids[0]["id"]
              top = api(f"{htag_id}/top_media", {
                  "user_id": IG_ID,
                  "fields": "id,like_count,comments_count,media_type,timestamp,permalink,caption"
              })
              posts = top.get("data", [])

              carousels = [p for p in posts if p.get("media_type") == "CAROUSEL_ALBUM"]
              for c in carousels:
                  c["_tag"] = tag
                  c["_score"] = c.get("like_count", 0) + c.get("comments_count", 0) * 10
              all_carousels.extend(carousels)
              time.sleep(0.5)

          # Deduplicate by permalink
          seen = set()
          unique = []
          for c in all_carousels:
              key = c.get("permalink", "")
              if key not in seen:
                  seen.add(key)
                  unique.append(c)

          # Sort by engagement score (likes + comments*10)
          unique.sort(key=lambda x: x["_score"], reverse=True)
          top10 = unique[:10]

          print(f"\n📑 Найдено уникальных каруселей: {len(unique)}")
          print(f"   Показываю топ {len(top10)} по вовлечённости\n")
          print("─" * 55)

          for i, post in enumerate(top10, 1):
              likes = post.get("like_count", 0)
              comments = post.get("comments_count", 0)
              date = post.get("timestamp", "")[:10]
              tag = post.get("_tag", "")
              caption = (post.get("caption", "") or "")[:70]
              link = post.get("permalink", "")
              score = post["_score"]

              print(f"\n#{i}  📑 #{tag}")
              print(f"    ❤️  {likes:,} лайков  💬 {comments:,} комментов  📅 {date}")
              print(f"    🔥 Engagement score: {score:,}")
              print(f"    📝 {caption}")
              print(f"    🔗 {link}")

          print("\n")
          print("═" * 55)
          print("💡 АНАЛИЗ:")
          if top10:
              avg_likes = sum(p.get("like_count",0) for p in top10) / len(top10)
              avg_comments = sum(p.get("comments_count",0) for p in top10) / len(top10)
              best_tag = max(set(p["_tag"] for p in top10),
                            key=lambda t: sum(p.get("like_count",0) for p in top10 if p["_tag"]==t))
              print(f"  Среднее у топ-каруселей: ❤️ {avg_likes:.0f} лайков  💬 {avg_comments:.0f} комментов")
              print(f"  Самый горячий хештег для каруселей: #{best_tag}")
              print(f"  Ваши текущие карусели в среднем: ❤️ ~1.5 лайков")
              gap = avg_likes / max(1.5, 1)
              print(f"  📈 Разрыв с топом: в {gap:.0f}x раз")
          print("═" * 55)
          PYEOF
