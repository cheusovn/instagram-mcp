name: Instagram Scheduled Publisher

on:
  schedule:
    # Каждые 5 минут — минимальный интервал GitHub Actions
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Принудительная проверка очереди'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check and publish due posts
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_API_VERSION: v22.0
        run: |
          cd remotion-carousel
          node publish-from-queue.mjs --window 600

      - name: Commit updated queue.json
        run: |
          git config user.name "Instagram Bot"
          git config user.email "bot@nikolay-cheusov.com"
          git add remotion-carousel/queue.json
          git diff --staged --quiet || git commit -m "auto: опубликован пост из очереди"
          git push
