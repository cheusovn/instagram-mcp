name: 🤖 Auto Publish — Schedule

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      post_id:
        description: 'Пост (оставь пустым для авто)'
        required: false
        default: ''

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
      INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine post and style
        id: pick
        run: |
          node --input-type=module << 'EOF'
          import fs from 'fs';

          // 3×3 grid rotation: A(neon) B(glass) A C(gold) A B A C A
          const SCHEDULE = [
            { post: 'post_01', style: 'StyleA-NeonKatana'  },
            { post: 'post_02', style: 'StyleB-GlassMinimal' },
            { post: 'post_03', style: 'StyleA-NeonKatana'  },
            { post: 'post_04', style: 'StyleC-GoldRush'    },
            { post: 'post_05', style: 'StyleA-NeonKatana'  },
            { post: 'post_06', style: 'StyleB-GlassMinimal' },
            { post: 'post_07', style: 'StyleA-NeonKatana'  },
            { post: 'post_08', style: 'StyleC-GoldRush'    },
            { post: 'post_09', style: 'StyleA-NeonKatana'  },
          ];

          const forced = '${{ inputs.post_id }}';

          let published = [];
          try { published = (JSON.parse(fs.readFileSync('content/published.json','utf8')).posts||[]).map(p=>p.post_id); } catch{}

          let entry;
          if (forced) {
            entry = SCHEDULE.find(s => s.post === forced);
          } else {
            entry = SCHEDULE.find(s => !published.includes(s.post));
          }

          if (!entry) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'skip=true\n');
            console.log('✅ Все посты опубликованы!');
          } else {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `post_id=${entry.post}\nstyle=${entry.style}\nskip=false\n`);
            console.log('Next:', entry.post, '|', entry.style);
          }
          EOF

      - name: Install deps
        if: steps.pick.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libcairo2 libpangocairo-1.0-0 \
            ffmpeg fonts-liberation

      - name: npm install
        if: steps.pick.outputs.skip != 'true'
        working-directory: remotion-carousel
        run: npm install

      - name: Prepare slides
        if: steps.pick.outputs.skip != 'true'
        run: node prepare-post.mjs ${{ steps.pick.outputs.post_id }}

      - name: Generate AI Backgrounds
        if: steps.pick.outputs.skip != 'true'
        working-directory: remotion-carousel
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          COMP="${{ steps.pick.outputs.style }}"
          case "$COMP" in
            StyleA-NeonKatana|Style03-BrutalistNeon) BG="StyleA-NeonKatana" ;;
            StyleB-GlassMinimal|Style04-Glassmorphism) BG="StyleB-GlassMinimal" ;;
            StyleC-GoldRush|Style01-Bebas3D) BG="StyleC-GoldRush" ;;
            *) BG="StyleA-NeonKatana" ;;
          esac
          echo "🎨 AI backgrounds: ${BG}"
          node generate-backgrounds.mjs --style=${BG}

      - name: Generate SFX
        if: steps.pick.outputs.skip != 'true'
        working-directory: remotion-carousel
        run: node generate-sfx.mjs

      - name: Render
        if: steps.pick.outputs.skip != 'true'
        working-directory: remotion-carousel
        run: |
          COMP="${{ steps.pick.outputs.style }}"
          echo "🎬 Рендерю стиль: $COMP"
          node render-slides.mjs "$COMP" --slides-only
          ls -lh ../out/slides/

      - name: Assemble
        if: steps.pick.outputs.skip != 'true'
        run: |
          ls out/slides/slide_*.mp4 | sort | awk '{print "file \x27" $0 "\x27"}' > /tmp/concat.txt
          ffmpeg -y -f concat -safe 0 -i /tmp/concat.txt \
            -c:v libx264 -preset medium -crf 20 -movflags +faststart \
            -vf "scale=1080:1350" out/carousel_full.mp4

      - name: Upload release
        if: steps.pick.outputs.skip != 'true'
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          POST="${{ steps.pick.outputs.post_id }}"
          STYLE="${{ steps.pick.outputs.style }}"
          TS=$(date +%Y%m%d_%H%M%S)
          TAG="content-${POST}-${TS}"
          FILE="${POST}_${TS}.mp4"
          cp out/carousel_full.mp4 "/tmp/${FILE}"
          gh release create "${TAG}" \
            --repo cheusovn/instagram-mcp \
            --title "📱 ${POST} · ${STYLE} · $(date '+%d.%m.%Y %H:%M') MSK" \
            --notes "Auto | ${STYLE}" \
            "/tmp/${FILE}"
          echo "video_url=https://github.com/cheusovn/instagram-mcp/releases/download/${TAG}/${FILE}" >> $GITHUB_OUTPUT

      - name: CDN wait
        if: steps.pick.outputs.skip != 'true'
        run: sleep 30

      - name: Publish Instagram
        if: steps.pick.outputs.skip != 'true'
        run: |
          node publish-instagram.mjs \
            --post "content/posts/${{ steps.pick.outputs.post_id }}.json" \
            --video "${{ steps.upload.outputs.video_url }}"

      - name: Commit log
        if: steps.pick.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Content Bot 🤖"
          git config user.email "bot@cheusov.ru"
          git add content/published.json 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "📱 auto: ${{ steps.pick.outputs.post_id }} (${{ steps.pick.outputs.style }}) → Instagram $(date '+%d.%m.%Y %H:%M')"
          git push || true
