name: Content Factory — Viral Carousel Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Тема карусели (напр: топ-5 нейросетей для видео 2026)'
        required: true
        default: 'топ-5 нейросетей для создания видео в 2026'
      slides:
        description: 'Количество слайдов (7-10)'
        required: false
        default: '8'
      language:
        description: 'Язык контента'
        required: false
        default: 'russian'
        type: choice
        options:
          - russian
          - english

jobs:
  generate-carousel:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TOPIC: ${{ inputs.topic }}
      SLIDES: ${{ inputs.slides }}
      LANG: ${{ inputs.language }}

    steps:
      - name: "🏭 Content Factory — Multi-Agent Carousel"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.parse, os, sys

          API_KEY = os.environ["OPENROUTER_API_KEY"]
          TOPIC   = os.environ["TOPIC"]
          SLIDES  = int(os.environ.get("SLIDES", "8"))
          LANG    = os.environ.get("LANG", "russian")

          # ──────────────────────────────────────────
          # OpenRouter call helper
          # ──────────────────────────────────────────
          def ask(model, system, user, temperature=0.85, max_tokens=2000):
              payload = json.dumps({
                  "model": model,
                  "temperature": temperature,
                  "max_tokens": max_tokens,
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user}
                  ]
              }).encode()
              req = urllib.request.Request(
                  "https://openrouter.ai/api/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                      "HTTP-Referer": "https://github.com/cheusovn/instagram-mcp",
                      "X-Title": "ContentFactory"
                  }
              )
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.loads(r.read())["choices"][0]["message"]["content"]

          LANG_HINT = "на русском языке" if LANG == "russian" else "in English"
          MODEL_SMART  = "anthropic/claude-3.5-sonnet"
          MODEL_FAST   = "google/gemini-flash-1.5"

          print("═" * 60)
          print("  🏭 КОНТЕНТ-ЗАВОД: ГЕНЕРАЦИЯ ВИРУСНОЙ КАРУСЕЛИ")
          print("═" * 60)
          print(f"  Тема: {TOPIC}")
          print(f"  Слайдов: {SLIDES}")
          print()

          # ══════════════════════════════════════════
          # АГЕНТ 1 — Маркетинговый стратег
          # ══════════════════════════════════════════
          print("🎯 [АГЕНТ 1] Маркетинговый стратег анализирует тему...")

          COMPETITIVE_INSIGHTS = """
          Топ-паттерны вирусных каруселей в нише нейросетей (реальные данные, июнь 2026):
          - #1 пост: 3 563 лайка, 1 211 комментов — «Comenta marcando alguём pra receber a ficha técnica» (призыв отметить друга + получить файл)
          - #2 пост: 903 лайка, 1 264 комментов — «Comment shadow to get the prompt» (слово в коммент = получи промпт)
          - Главный хэштег: #sora доминирует топ-10
          - Формула: триггерный хук → ценность → призыв написать слово → получить бонус
          - Средний топ: 3 041 лайков, 347 комментов
          """

          strat_out = ask(
              MODEL_SMART,
              f"""Ты — топовый маркетинговый стратег Instagram для ниши ИИ/нейросети.
              Пиши {LANG_HINT}. Работаешь с русскоязычной аудиторией (Россия, СНГ).
              Твоя задача: дать чёткую стратегию для одного карусельного поста.""",
              f"""Тема карусели: "{TOPIC}"

              Данные о конкурентах:
              {COMPETITIVE_INSIGHTS}

              Дай стратегию для карусели ({SLIDES} слайдов) {LANG_HINT}:
              1. ГЛАВНЫЙ ХУК (первый слайд — 1 сильная фраза, ≤8 слов, вызывает любопытство/шок/пользу)
              2. ОБЕЩАНИЕ ЦЕННОСТИ (что человек узнает)
              3. ЦЕЛЕВАЯ АУДИТОРИЯ (кто это, боли, желания)
              4. ПСИХОЛОГИЧЕСКИЙ ТРИГГЕР (почему остановятся на этом посте)
              5. CTA (призыв в конце — слово в коммент или действие, максимально конкретное)
              6. ХЭШТЕГИ (5 основных для ниши)

              Формат: структурированно, без воды."""
          )
          print("  ✅ Стратегия готова")
          print()

          # ══════════════════════════════════════════
          # АГЕНТ 2 — Психолог/Hook-специалист
          # ══════════════════════════════════════════
          print("🧠 [АГЕНТ 2] Психолог создаёт крючки для каждого слайда...")

          psych_out = ask(
              MODEL_SMART,
              f"""Ты — специалист по поведенческой психологии и вирусному контенту.
              Знаешь паттерны: gap theory (пробел в знаниях), FOMO, social proof, reciprocity.
              Пиши {LANG_HINT}, коротко и мощно.""",
              f"""Тема: "{TOPIC}"

              Стратегия от маркетолога:
              {strat_out}

              Создай структуру из {SLIDES} слайдов с психологическими крючками {LANG_HINT}:

              Для каждого слайда укажи:
              - СЛАЙД N: [заголовок/текст, ≤10 слов]
              - Психологический механизм: [gap/FOMO/social proof/authority/reciprocity/curiosity]
              - Подзаголовок/тело (2-3 строки максимум)
              - Переходная фраза к следующему слайду (удерживает скролл)

              Слайд 1 = ВЗРЫВ ВНИМАНИЯ (стоп-скролл)
              Слайды 2-{SLIDES-1} = нарастающая ценность
              Слайд {SLIDES} = мощный CTA (конкретное слово в комментах)"""
          )
          print("  ✅ Психологические крючки готовы")
          print()

          # ══════════════════════════════════════════
          # АГЕНТ 3 — UX/UI дизайнер
          # ══════════════════════════════════════════
          print("🎨 [АГЕНТ 3] UX/UI дизайнер прорабатывает визуал...")

          design_out = ask(
              MODEL_FAST,
              f"""Ты — топовый UX/UI дизайнер Instagram каруселей в стиле 2025-2026.
              Знаешь тренды: минимализм с акцентами, тёмные фоны + неоновые детали,
              крупная типографика, glassmorphism, cinematic color grading.
              Давай конкретные визуальные директивы {LANG_HINT}.""",
              f"""Тема карусели: "{TOPIC}"

              Структура слайдов:
              {psych_out}

              Создай полный дизайн-бриф для карусели {LANG_HINT}:

              ОБЩИЙ СТИЛЬ:
              - Цветовая палитра (hex коды, 3-4 цвета)
              - Шрифт (название + вес)
              - Общий визуальный настрой
              - Размер (1080x1350px portrait)

              ДЛЯ КАЖДОГО СЛАЙДА:
              - Фон: [описание фона/изображения]
              - Текст: [позиция, размер, цвет]
              - Главный элемент: [иконка/иллюстрация/скриншот/абстракция]
              - Prompt для генерации изображения через Midjourney/DALL-E:
                «[детальный промпт на английском, 1080x1350, Instagram portrait, ultra HD]»

              Стиль должен быть современным и выделяться в ленте."""
          )
          print("  ✅ Дизайн-бриф готов")
          print()

          # ══════════════════════════════════════════
          # АГЕНТ 4 — Копирайтер (финальный текст)
          # ══════════════════════════════════════════
          print("✍️  [АГЕНТ 4] Копирайтер пишет финальные тексты...")

          copy_out = ask(
              MODEL_SMART,
              f"""Ты — топовый копирайтер Instagram с фокусом на нишу ИИ/нейросети.
              Пишешь {LANG_HINT} для русскоязычной аудитории.
              Стиль: энергичный, без воды, с эмодзи где уместно, разговорный.
              Знаешь как писать стоп-скролл заголовки и вирусные CTA.""",
              f"""Тема: "{TOPIC}"

              Психологическая структура слайдов:
              {psych_out}

              Напиши ФИНАЛЬНЫЕ ТЕКСТЫ для каждого слайда {LANG_HINT}:

              СЛАЙД 1 (ОБЛОЖКА):
              [Главный заголовок — 1 строка, максимум 8 слов, шок/польза/интрига]

              СЛАЙДЫ 2-{SLIDES-1} (контент):
              [Заголовок слайда — ≤8 слов]
              [Текст — 2-3 строки с конкретикой]

              СЛАЙД {SLIDES} (CTA):
              [Призыв действия — конкретное слово в комментах]
              [Что человек получит]

              CAPTION ДЛЯ ПОСТА:
              [Первые 2-3 строки — хук перед «ещё»]
              [Полный текст — история/ценность]
              [CTA]
              [Хэштеги]

              Используй паттерн «Напиши [СЛОВО] в комментах — пришлю [ЦЕННОСТЬ]»."""
          )
          print("  ✅ Тексты готовы")
          print()

          # ══════════════════════════════════════════
          # ФИНАЛЬНЫЙ ОТЧЁТ
          # ══════════════════════════════════════════
          print("═" * 60)
          print("  📋 ИТОГОВЫЙ БРИФ ДЛЯ ПРОДАКШЕНА")
          print("═" * 60)
          print()
          print("━━━ 🎯 МАРКЕТИНГОВАЯ СТРАТЕГИЯ ━━━")
          print(strat_out)
          print()
          print("━━━ 🧠 ПСИХОЛОГИЧЕСКАЯ СТРУКТУРА СЛАЙДОВ ━━━")
          print(psych_out)
          print()
          print("━━━ 🎨 ДИЗАЙН-БРИФ + ПРОМПТЫ ДЛЯ ИЗОБРАЖЕНИЙ ━━━")
          print(design_out)
          print()
          print("━━━ ✍️  ФИНАЛЬНЫЕ ТЕКСТЫ + CAPTION ━━━")
          print(copy_out)
          print()
          print("═" * 60)
          print("  ✅ КАРУСЕЛЬ ГОТОВА К ПРОДАКШЕНУ")
          print(f"  Следующий шаг: создай {SLIDES} слайдов в Canva/Figma")
          print("  используя дизайн-бриф и промпты выше.")
          print("  Публикуй в 19:00-21:00 по МСК (пик активности).")
          print("═" * 60)
          PYEOF
