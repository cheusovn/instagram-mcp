name: Content Factory — Viral Carousel Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Тема карусели'
        required: true
        default: 'топ-5 нейросетей для создания видео в 2026'
      slides:
        description: 'Количество слайдов (7-10)'
        required: false
        default: '8'
      language:
        description: 'Язык контента'
        required: false
        default: 'russian'
        type: choice
        options:
          - russian
          - english

jobs:
  generate-carousel:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TOPIC: ${{ inputs.topic }}
      SLIDES: ${{ inputs.slides }}
      LANG: ${{ inputs.language }}

    steps:
      - name: "🏭 Content Factory — 5-Agent Carousel"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          API_KEY = os.environ["OPENROUTER_API_KEY"]
          TOPIC   = os.environ["TOPIC"]
          SLIDES  = int(os.environ.get("SLIDES", "8"))
          LANG    = os.environ.get("LANG", "russian")
          MODEL   = "google/gemini-3.1-flash-image-preview"

          def ask(system, user, max_tokens=3000):
              payload = json.dumps({
                  "model": MODEL,
                  "temperature": 0.75,
                  "max_tokens": max_tokens,
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user}
                  ]
              }).encode()
              req = urllib.request.Request(
                  "https://openrouter.ai/api/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                      "HTTP-Referer": "https://github.com/cheusovn/instagram-mcp",
                      "X-Title": "ContentFactory"
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=90) as r:
                      return json.loads(r.read())["choices"][0]["message"]["content"]
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"  ❌ HTTP {e.code}: {body[:400]}")
                  raise

          LANG_HINT = "на русском языке" if LANG == "russian" else "in English"
          AUDIENCE  = "русскоязычная аудитория: Россия, Украина, Казахстан. 25-40 лет. Интерес: нейросети, продуктивность, заработок."
          INSIGHTS  = """Конкуренты (ниша ИИ, июнь 2026):
- Лучший CTA: «Напиши СЛОВО в комментах — пришлю бонус» → 1200+ комментариев
- Топ хэштег: #sora #нейросеть
- Средний топ: 3041 лайков, 347 комментариев
- Лучшее время: 19:00-21:00 МСК"""

          # CTA-блок: Telegram без ссылки (Telegram указан в шапке профиля)
          TG_SLIDE_TEXT = """
          Последний слайд = закрытый Telegram-канал (CTA). Текст:
          Заголовок: "Хочешь ещё больше?"
          Подзаголовок: "У меня есть закрытый Telegram — там бесплатно:"
          • ежедневные фишки и промпты
          • разборы ИИ-инструментов
          • кейсы + шаблоны
          Призыв: "Ссылка в шапке профиля ↓"
          """

          TG_CAPTION_TAIL = """
⬇️ Больше такого — в моём Telegram. Ссылка в шапке профиля.
          """

          print("═" * 60)
          print("  🏭 КОНТЕНТ-ЗАВОД — 5 АГЕНТОВ")
          print(f"  Модель: {MODEL}")
          print("═" * 60)
          print(f"  Тема:   {TOPIC}")
          print(f"  Слайдов: {SLIDES}")
          print()

          # ══ АГЕНТ 0: ФАКТЧЕКЕР ═══════════════════════════════
          print("🔍 [АГЕНТ 0] Фактчекер собирает реальные факты...")
          facts = ask(
              """Ты — эксперт по ИИ/нейросетям с актуальными знаниями на 2025-2026 год.
              Давай только проверенные факты с цифрами, названиями инструментов, ценами, скоростью работы.
              Без воды и домыслов. На русском языке.""",
              f"""Тема: "{TOPIC}"
Аудитория: {AUDIENCE}

Собери {SLIDES-1} ключевых факта по теме. Для каждого:
- ФАКТ: [точное утверждение с цифрой/названием/примером]
- ПОЧЕМУ ЭТО ВАЖНО: [практическая ценность для человека]
- ПРИМЕР ИСПОЛЬЗОВАНИЯ: [как применить прямо сейчас]

Факты должны быть верифицируемыми (не фантазия). Даты, цифры — реальные."""
          )
          print("  ✅ Фактовая база готова")
          print()

          # ══ АГЕНТ 1: МАРКЕТОЛОГ ═══════════════════════════════
          print("🎯 [АГЕНТ 1] Маркетолог...")
          strat = ask(
              f"Ты топовый маркетолог Instagram. {AUDIENCE}. Пишешь конкретно, без воды, {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
{INSIGHTS}
Факты по теме:
{facts}

Дай стратегию для карусели ({SLIDES} слайдов):
1. ГЛАВНЫЙ ХУК (слайд 1, ≤8 слов, шок/цифра/интрига, базируется на реальных фактах)
2. ОБЕщАНИЕ (что узнает читатель)
3. ЦЕЛЕВАЯ АУДИТОРИЯ
4. CTA-СЛОВО в комментах (конкретное, 1 слово + что получат)
5. 5-7 ХЭШТЕГОВ для ниши
ВАЖНО: последний слайд всегда = Telegram CTA (ссылка в шапке профиля)"""
          )
          print("  ✅ Стратегия готова")
          print()

          # ══ АГЕНТ 2: ПСИХОЛОГ ══════════════════════════════════
          print("🧠 [АГЕНТ 2] Психолог...")
          psych = ask(
              f"Ты специалист по поведенческой психологии и вирусному контенту. {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
Факты: {facts}
Стратегия: {strat}

Создай структуру {SLIDES} слайдов. Каждый слайд (1..{SLIDES-1}) должен быть:
- информационным (конкретный факт, цифра, пример)
- логичным (1 слайд = 1 мысль)
- интересным (не очевидный факт, удивляет или полезен)

Для каждого слайда (1..{SLIDES-1}) укажи:
- СЛАЙД N: [заголовок, ≤10 слов, основан на факте]
- Психотриггер: [gap/FOMO/social proof/authority/curiosity/reciprocity]
- Ключевой факт: [конкретная деталь, цифра или пример]
- Подзаголовок/тело (2-3 строки, без воды)
- Переход: [фраза-крючок к следующему слайду]

СЛАЙД {SLIDES} = TELEGRAM CTA:
{TG_SLIDE_TEXT}"""
          )
          print("  ✅ Структура слайдов готова")
          print()

          # ══ АГЕНТ 3: UX/UI дизайнер ═════════════════════════════
          print("🎨 [АГЕНТ 3] UX/UI дизайнер...")
          design = ask(
              f"Ты топовый UX/UI дизайнер Instagram. Тренды 2026: dark+neon, glassmorphism, bold typography. {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
Структура слайдов: {psych}

Дизайн-бриф {LANG_HINT}:

ОБЩИЙ СТИЛЬ:
- Цветовая палитра (hex, 3-4 цвета)
- Шрифт (название + вес)
- Визуальный настрой
- Размер: 1080×1350px portrait

ДЛЯ КАЖДОГО СЛАЙДА (1..{SLIDES-1}):
- Фон
- Текст (позиция, размер, цвет)
- Главный элемент (иконка/график/скриншот)
- Image prompt для DALL-E/Midjourney (English, ultra HD, 1080x1350 portrait):
  «[detailed prompt]»

СЛАЙД {SLIDES} (Telegram CTA):
- Фон: тёмный, логотип Telegram (#2AABEE), премиально
- Текст: CTA подписаться, ссылка в шапке профиля
- Image prompt: "dark premium background, glowing Telegram blue logo, bold Russian CTA text, Instagram portrait 1080x1350, professional, minimalist"""
          )
          print("  ✅ Дизайн-бриф готов")
          print()

          # ══ АГЕНТ 4: КОПИРАЙТЕР ══════════════════════════════
          print("✍️  [АГЕНТ 4] Копирайтер...")
          copy = ask(
              f"Ты топовый копирайтер Instagram. {LANG_HINT}. Энергично, конкретно, без воды. Факты — только проверенные.",
              f"""Тема: "{TOPIC}"
Факты: {facts}
Структура: {psych}

Напиши ФИНАЛЬНЫЕ ТЕКСТЫ для каждого слайда:

СЛАЙД 1 (ОБЛОЖКА — СТОП-СКРОЛЛ):
[Заголовок с цифрой или шоком, 1 строка, ≤8 слов]
[Подзаголовок: что внутри — 1 строка]

СЛАЙДЫ 2-{SLIDES-1} (КОНТЕНТ — ИНФОРМАЦИЯ):
[Заголовок, ≤8 слов, используй конкретный факт из базы]
[Текст: 2-3 строки — что, почему важно, пример использования]

СЛАЙД {SLIDES} (TELEGRAM CTA):
"Хочешь ещё больше?"
"У меня есть закрытый Telegram — там бесплатно:"
"• ежедневные фишки и промпты"
"• разборы ИИ-инструментов"
"• кейсы + шаблоны"
"→ Ссылка в шапке профиля ↓"

CAPTION ДЛЯ ПОСТА ({LANG_HINT}):
[Хук 2-3 строки — шокирующий факт]
[Текст: история + ценность, 3-5 строк]
[Слово в комментах = [CTA-слово]]
[Хэштеги]
{TG_CAPTION_TAIL}"""
          )
          print("  ✅ Тексты готовы")
          print()

          # ── ФИНАЛЬНЫЙ ОТЧЁТ
          print("═" * 60)
          print("  📋 ИТОГОВЫЙ БРИФ")
          print("═" * 60)
          print()
          print("━" * 60)
          print("🔍 ФАКТОВАЯ БАЗА")
          print("━" * 60)
          print(facts)
          print()
          print("━" * 60)
          print("🎯 МАРКЕТИНГОВАЯ СТРАТЕГИЯ")
          print("━" * 60)
          print(strat)
          print()
          print("━" * 60)
          print("🧠 ПСИХОЛОГИЧЕСКАЯ СТРУКТУРА СЛАЙДОВ")
          print("━" * 60)
          print(psych)
          print()
          print("━" * 60)
          print("🎨 ДИЗАЙН-БРИФ + ПРОМПТЫ ДЛЯ ИЗОБРАЖЕНИЙ")
          print("━" * 60)
          print(design)
          print()
          print("━" * 60)
          print("✍️  ФИНАЛЬНЫЕ ТЕКСТЫ + CAPTION")
          print("━" * 60)
          print(copy)
          print()
          print("═" * 60)
          print(f"  ✅ КАРУСЕЛЬ ГОТОВА ({SLIDES} слайдов)")
          print(f"  Последний слайд = Telegram CTA (ссылка в шапке профиля)")
          print("  Публикуй в 19:00-21:00 МСК.")
          print("═" * 60)
          PYEOF
