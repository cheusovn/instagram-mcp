name: Content Factory — Viral Carousel Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Тема карусели'
        required: true
        default: 'топ-5 нейросетей для создания видео в 2026'
      slides:
        description: 'Количество слайдов (7-10)'
        required: false
        default: '8'
      language:
        description: 'Язык контента'
        required: false
        default: 'russian'
        type: choice
        options:
          - russian
          - english

jobs:
  generate-carousel:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TOPIC: ${{ inputs.topic }}
      SLIDES: ${{ inputs.slides }}
      LANG: ${{ inputs.language }}

    steps:
      - name: "🏭 Content Factory — 5-Agent Carousel"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          API_KEY = os.environ["OPENROUTER_API_KEY"]
          TOPIC   = os.environ["TOPIC"]
          SLIDES  = int(os.environ.get("SLIDES", "8"))
          LANG    = os.environ.get("LANG", "russian")
          MODEL   = "google/gemini-3.1-flash-image-preview"

          def ask(system, user, max_tokens=3000):
              payload = json.dumps({
                  "model": MODEL,
                  "temperature": 0.75,
                  "max_tokens": max_tokens,
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user}
                  ]
              }).encode()
              req = urllib.request.Request(
                  "https://openrouter.ai/api/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                      "HTTP-Referer": "https://github.com/cheusovn/instagram-mcp",
                      "X-Title": "ContentFactory"
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=90) as r:
                      return json.loads(r.read())["choices"][0]["message"]["content"]
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"  ❌ HTTP {e.code}: {body[:400]}")
                  raise

          LANG_HINT = "на русском языке" if LANG == "russian" else "in English"
          AUDIENCE  = "русскоязычная аудитория: Россия, Украина, Казахстан. 25-40 лет. Ниша: ИИ-видео и фото, гайды «без опыта». Интерес: нейросети, продуктивность, заработок."

          # ── Алгоритм Instagram 2026: на что оптимизируем (НЕ лайки) ──
          ALGO  = """АЛГОРИТМ INSTAGRAM 2026 — ранжирует по 3 сигналам (не по лайкам):
          1) WATCH TIME / удержание — досматривают ли карусель до конца (swipe-through 70%+ = охват x3-5).
          2) SENDS (отправки в личку) — весят x3-5 к лайку. Контент должен хотеться «скинуть другу».
          3) SAVES (сохранения) — гайды/промпты/чек-листы сохраняют → сигнал ценности.
          Лайки — слабый сигнал, на них НЕ оптимизируем.
          80% смотрят БЕЗ ЗВУКА → всё решает текст на экране, ключевые слова заголовка ВЫДЕЛЯТЬ цветом/КАПСОМ."""

          # ── Психотриггеры и правила хука (из HOOKS_BANK) ──
          HOOKS = """ПСИХОТРИГГЕРЫ ХУКОВ (выбирай сильнейший под факт):
          - curiosity gap (пробел любопытства): «90% не знают, что эта кнопка делает ИИ-видео из 1 фото».
          - FOMO: «Эта нейросеть вышла вчера и уже меняет всё».
          - social proof: «Этот ролик собрал 8 000 лайков. Вот как я его сделал».
          - authority: «Перепробовал 30 нейросетей. Эта — лучшая для видео».
          - страх потери/боль: «Твои ИИ-видео выглядят дёшево из-за ОДНОЙ ошибки».
          - конкретная цифра: «5 минут — и у тебя готовое ИИ-видео с нуля».
          - до/после: «Старое фото → ожившее видео за минуту».
          - провокация/контринтуитив: «Тебе НЕ нужна дорогая нейросеть, чтобы делать такое».
          - личная история: «Год назад я не умел ничего. Вчера моё ИИ-видео взорвалось».

          ФОРМУЛЫ ЗАГОЛОВКОВ-ШАБЛОНОВ (подставляй факты):
          - «[N] [время] — и у тебя [результат] с нуля»
          - «Это [результат] сделано в [X] за [время]. Угадаешь как?»
          - «90% не знают, что [X] умеет [результат]»
          - «Не делай [действие], пока не увидишь это»
          - «Из [было] → в [стало] за [время]. Смотри переход»
          - «[N] ошибки новичков в [теме], которые видно сразу»
          - «Тебе НЕ нужна [дорогая вещь], чтобы [результат]»
          - «Этот [контент] собрал [N] [реакций]. Вот как я его сделал»

          ПРАВИЛА ХУКА:
          - Хук решает в первые 2 секунды. Слайд 1 несёт 80% веса.
          - 5-8 слов, крупно, высокий контраст, читается за один взгляд.
          - Слайд 1 = сильнейший хук + ДВИЖЕНИЕ в первые 0.5 сек (видео, не статика)."""

          # ── OPEN LOOP: ответ держать до предпоследнего слайда ──
          OPEN_LOOP = """OPEN LOOP (главный механизм удержания):
          - На слайде 1 создаётся пробел любопытства / обещание — ОТВЕТ НЕ ДАВАТЬ СРАЗУ.
          - Слайды 2..N-1 раскрывают обещание ПО ШАГАМ, каждый слайд = 1 микро-результат (виден прогресс).
          - Главный ответ/развязку держать до ПРЕДПОСЛЕДНЕГО слайда (тянет swipe-through к 70%+).
          - Каждый слайд заканчивается крючком-мостиком к следующему («а дальше — самое важное…»).
          - Ответ, выданный на 1-м слайде, убивает охват — ЗАПРЕЩЕНО."""

          INSIGHTS  = """Что заходит в нише ИИ (июнь 2026):
          - «промпт → результат» и «до → после» — лучшие save/send-триггеры (виден вход И выход).
          - Конкретная цифра/результат вместо абстракций («за 5 минут», «из 1 фото»).
          - FOMO на новинках ИИ («вышло X — вот что умеет») — высокий save.
          - Личность + личная история против faceless-ферм — даёт лояльность.
          - Топ хэштеги ниши: #нейросети #ии #chatgpt #sora #midjourney #runway #aitools
          - Лучшее время: 19:00-21:00 МСК.
          Что НЕ заходит: сухой текст без хука и движения; ответ на 1-м слайде; generic/glitchy картинка; прямая продажа без бесплатной ценности."""

          # CTA-блок: единый призыв в Telegram (ссылка в шапке профиля)
          TG_SLIDE_TEXT = """
          Последний слайд = ЕДИНЫЙ CTA в Telegram-канал. Обязательные элементы:
          - крупный значок Telegram (логотип #2AABEE, узнаваемый «бумажный самолётик»)
          - скриншот моего профиля Instagram @nikolay_cheusov (мокап телефона / карточка профиля)
          Текст слайда:
          Заголовок: "Больше информации — в моём Telegram-канале"
          Подзаголовок: "Там подробнее, чем в посте: разборы, промпты, кейсы, шаблоны"
          Призыв: "Ссылка в шапке профиля ↓"
          """

          TG_CAPTION_TAIL = """
          ⬇️ Все гайды, промпты и разборы — в моём Telegram. Ссылка в шапке профиля ⚡️
          """

          # ── ЕДИНЫЙ CTA. ЗАПРЕЩЁННЫЕ механики (по GROWTH_PLAN) ──
          CTA_RULES = """ПРАВИЛА CTA (строго):
          - ЕДИНСТВЕННЫЙ призыв = «Все гайды → ссылка в шапке профиля» (переток в Telegram).
          - ЗАПРЕЩЕНО: «пиши/напиши слово в комментариях», «коммент = бонус», CTA-слово в комментах.
          - ЗАПРЕЩЕНО: «подпишись» (алгоритм штрафует прямые просьбы подписаться).
          - Встроить мягкие save/send-триггеры в сценарий: «сохрани, чтобы не потерять», «скинь другу, который хочет так же» — это работает на saves/sends, а НЕ просьба о комментарии.
          - Если нужен «ключ/слово» — это слово для перехода в Telegram (в шапке профиля), НЕ для комментариев."""

          print("═" * 60)
          print("  🏭 КОНТЕНТ-ЗАВОД — 5 АГЕНТОВ")
          print(f"  Модель: {MODEL}")
          print("═" * 60)
          print(f"  Тема:   {TOPIC}")
          print(f"  Слайдов: {SLIDES}")
          print()

          # ══ АГЕНТ 0: ФАКТЧЕКЕР ═══════════════════════════════
          print("🔍 [АГЕНТ 0] Фактчекер собирает реальные факты...")
          facts = ask(
              """Ты — эксперт по ИИ/нейросетям с актуальными знаниями на 2025-2026 год.
              Давай только проверенные факты с цифрами, названиями инструментов, ценами, скоростью работы.
              Без воды и домыслов. На русском языке.""",
              f"""Тема: "{TOPIC}"
          Аудитория: {AUDIENCE}

          Собери {SLIDES-1} ключевых факта по теме. Для каждого:
          - ФАКТ: [точное утверждение с цифрой/названием/примером]
          - ПОЧЕМУ ЭТО ВАЖНО: [практическая ценность для человека]
          - ПРИМЕР ИСПОЛЬЗОВАНИЯ: [как применить прямо сейчас]

          Факты должны быть верифицируемыми (не фантазия). Даты, цифры — реальные."""
          )
          print("  ✅ Фактовая база готова")
          print()

          # ══ АГЕНТ 1: МАРКЕТОЛОГ ═══════════════════════════════
          print("🎯 [АГЕНТ 1] Маркетолог...")
          strat = ask(
              f"Ты топовый маркетолог Instagram в нише ИИ. {AUDIENCE}. Пишешь конкретно, без воды, {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
          {ALGO}
          {HOOKS}
          {INSIGHTS}
          {CTA_RULES}
          Факты по теме:
          {facts}

          Дай стратегию для ВИДЕОкарусели 4:5 ({SLIDES} слайдов), оптимизированной под WATCH TIME / SENDS / SAVES (не лайки):
          1. ГЛАВНЫЙ ХУК (слайд 1, ≤8 слов): возьми сильнейший психотриггер под факт + укажи КАКОЙ это триггер + по какой формуле-шаблону. Хук должен создавать пробел любопытства (open loop), а НЕ давать ответ.
          2. OPEN LOOP: какое обещание держим до предпоследнего слайда (где развязка).
          3. ОБЕЩАНИЕ (что узнает/получит читатель) + почему захочется СОХРАНИТЬ и ПЕРЕСЛАТЬ другу.
          4. ЦЕЛЕВАЯ АУДИТОРИЯ.
          5. ЕДИНЫЙ CTA = «Все гайды → ссылка в шапке профиля» (Telegram). НЕ предлагай «слово в комментах», НЕ предлагай «подпишись».
          6. 5-7 ХЭШТЕГОВ ниши.
          ВАЖНО: последний слайд всегда = Telegram CTA (ссылка в шапке профиля)."""
          )
          print("  ✅ Стратегия готова")
          print()

          # ══ АГЕНТ 2: ПСИХОЛОГ ══════════════════════════════════
          print("🧠 [АГЕНТ 2] Психолог...")
          psych = ask(
              f"Ты специалист по поведенческой психологии и вирусному контенту в нише ИИ. {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
          Факты: {facts}
          Стратегия: {strat}
          {ALGO}
          {HOOKS}
          {OPEN_LOOP}

          Построй структуру {SLIDES} слайдов по принципу OPEN LOOP:
          - СЛАЙД 1 = сильнейший хук с ДВИЖЕНИЕМ, создаёт пробел любопытства, ответ НЕ даёт.
          - СЛАЙДЫ 2..{SLIDES-1} = пошаговое раскрытие обещания, 1 слайд = 1 микро-результат (виден прогресс).
          - Главную развязку/ответ держи до ПРЕДПОСЛЕДНЕГО слайда ({SLIDES-1}).
          Каждый слайд (1..{SLIDES-1}) должен быть конкретным (факт/цифра/пример), 1 слайд = 1 мысль.

          Для каждого слайда (1..{SLIDES-1}) укажи:
          - СЛАЙД N: [заголовок, ≤8 слов, основан на факте; КЛЮЧЕВЫЕ СЛОВА КАПСОМ для просмотра без звука]
          - Психотриггер: [curiosity gap / FOMO / social proof / authority / страх потери / конкретная цифра / до-после / провокация / личная история]
          - Ключевой факт: [конкретная деталь, цифра или пример]
          - Тело (2-3 строки, без воды; где уместно — формат «промпт → результат» или «до → после»)
          - Open-loop переход: [крючок-мостик к следующему слайду, усиливает желание свайпнуть]
          - На каком слайде раскрывается главный ответ (должно быть = {SLIDES-1}, не раньше).

          СЛАЙД {SLIDES} = TELEGRAM CTA (единый, по правилам):
          {CTA_RULES}
          {TG_SLIDE_TEXT}"""
          )
          print("  ✅ Структура слайдов готова")
          print()

          # ══ АГЕНТ 3: UX/UI дизайнер ═════════════════════════════
          print("🎨 [АГЕНТ 3] UX/UI дизайнер...")
          design = ask(
              f"Ты топовый UX/UI дизайнер Instagram. Тренды 2026: dark+neon, glassmorphism, bold typography. {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
          Структура слайдов: {psych}

          Дизайн-бриф {LANG_HINT}:

          ОБЩИЙ СТИЛЬ:
          - Цветовая палитра (hex, 3-4 цвета): 1 фон + 1 ЯРКИЙ акцент для выделения ключевых слов
          - Шрифт (название + вес): жирный, высокий контраст, читается за один взгляд
          - Визуальный настрой
          - Размер: 1080×1350px portrait
          - 80% смотрят БЕЗ ЗВУКА → КЛЮЧЕВЫЕ СЛОВА заголовка выделять акцентным цветом/капсом на КАЖДОМ слайде.
          - Слайд 1: предусмотреть ДВИЖЕНИЕ в первые 0.5 сек (анимация текста/элемента) — это видеокарусель, не статика.

          ДЛЯ КАЖДОГО СЛАЙДА (1..{SLIDES-1}):
          - Фон
          - Текст (позиция, размер, цвет) + КАКИЕ слова выделить акцентным цветом (для просмотра без звука)
          - Главный элемент (иконка/график/скриншот)
          - Image prompt для DALL-E/Midjourney (English, ultra HD, 1080x1350 portrait):
            «[detailed prompt]»

          СЛАЙД {SLIDES} (Telegram CTA — единый для всех постов):
          - Фон: тёмный премиальный
          - ОБЯЗАТЕЛЬНО: крупный логотип Telegram (#2AABEE) + скриншот/мокап профиля Instagram @nikolay_cheusov
          - Текст: "Больше информации — в моём Telegram-канале", "Ссылка в шапке профиля ↓"
          - Image prompt: "dark premium background, large glowing Telegram blue logo (#2AABEE paper-plane), realistic smartphone mockup showing an Instagram profile screenshot, bold Russian CTA text, Instagram portrait 1080x1350, professional, minimalist"""
          )
          print("  ✅ Дизайн-бриф готов")
          print()

          # ══ АГЕНТ 4: КОПИРАЙТЕР ══════════════════════════════
          print("✍️  [АГЕНТ 4] Копирайтер...")
          copy = ask(
              f"Ты топовый копирайтер Instagram. {LANG_HINT}. Энергично, конкретно, без воды. Факты — только проверенные.",
              f"""Тема: "{TOPIC}"
          Факты: {facts}
          Структура: {psych}

          Напиши ФИНАЛЬНЫЕ ТЕКСТЫ для каждого слайда:

          СЛАЙД 1 (ОБЛОЖКА — СТОП-СКРОЛЛ):
          [Заголовок-ХУК, ≤8 слов, сильнейший психотриггер + open loop — НЕ давать ответ; КЛЮЧЕВЫЕ 1-2 СЛОВА КАПСОМ (просмотр без звука)]
          [Подзаголовок: обещание/интрига — 1 строка, тоже без ответа]

          СЛАЙДЫ 2-{SLIDES-1} (КОНТЕНТ — ИНФОРМАЦИЯ, OPEN LOOP):
          [Заголовок, ≤8 слов, конкретный факт из базы; КЛЮЧЕВЫЕ СЛОВА КАПСОМ для просмотра без звука]
          [Тело: 2-3 строки — что, почему важно, пример; где уместно «промпт → результат» или «до → после». Без воды.]
          [В конце — крючок-мостик к следующему слайду. Главную развязку держать до слайда {SLIDES-1}.]

          СЛАЙД {SLIDES} (TELEGRAM CTA — единый для всех постов):
          "Больше информации — в моём Telegram-канале"
          "Там подробнее, чем в посте: разборы, промпты, кейсы, шаблоны"
          "→ Ссылка в шапке профиля ↓"
          (на слайде: значок Telegram + скриншот профиля Instagram @nikolay_cheusov)

          CAPTION ДЛЯ ПОСТА ({LANG_HINT}):
          [Хук 2-3 строки — крючок виден до «ещё»: создаёт пробел любопытства, НЕ даёт ответ]
          [Текст: личная история + ценность, 3-5 строк; вплети мягкий save/send-триггер («сохрани, чтобы повторить», «скинь другу, который тоже хочет так»)]
          [ЕДИНЫЙ CTA = «Все гайды → ссылка в шапке профиля» (Telegram). ЗАПРЕЩЕНО «пиши слово в комментариях» и «подпишись». Если нужен ключ — это слово для перехода в Telegram, НЕ для комментариев.]
          [Хэштеги]
          {CTA_RULES}
          {TG_CAPTION_TAIL}"""
          )
          print("  ✅ Тексты готовы")
          print()

          # ── ФИНАЛЬНЫЙ ОТЧЁТ
          print("═" * 60)
          print("  📋 ИТОГОВЫЙ БРИФ")
          print("═" * 60)
          print()
          print("━" * 60)
          print("🔍 ФАКТОВАЯ БАЗА")
          print("━" * 60)
          print(facts)
          print()
          print("━" * 60)
          print("🎯 МАРКЕТИНГОВАЯ СТРАТЕГИЯ")
          print("━" * 60)
          print(strat)
          print()
          print("━" * 60)
          print("🧠 ПСИХОЛОГИЧЕСКАЯ СТРУКТУРА СЛАЙДОВ")
          print("━" * 60)
          print(psych)
          print()
          print("━" * 60)
          print("🎨 ДИЗАЙН-БРИФ + ПРОМПТЫ ДЛЯ ИЗОБРАЖЕНИЙ")
          print("━" * 60)
          print(design)
          print()
          print("━" * 60)
          print("✍️  ФИНАЛЬНЫЕ ТЕКСТЫ + CAPTION")
          print("━" * 60)
          print(copy)
          print()
          print("═" * 60)
          print(f"  ✅ КАРУСЕЛЬ ГОТОВА ({SLIDES} слайдов)")
          print(f"  Последний слайд = Telegram CTA (ссылка в шапке профиля)")
          print("  Публикуй в 19:00-21:00 МСК.")
          print("═" * 60)
          PYEOF
