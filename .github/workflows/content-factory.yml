name: Content Factory — Viral Carousel Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Тема карусели (напр: топ-5 нейросетей для видео 2026)'
        required: true
        default: 'топ-5 нейросетей для создания видео в 2026'
      slides:
        description: 'Количество слайдов (7-10)'
        required: false
        default: '8'
      language:
        description: 'Язык контента'
        required: false
        default: 'russian'
        type: choice
        options:
          - russian
          - english

jobs:
  generate-carousel:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TOPIC: ${{ inputs.topic }}
      SLIDES: ${{ inputs.slides }}
      LANG: ${{ inputs.language }}

    steps:
      - name: "🏭 Content Factory — Multi-Agent Carousel"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.parse, os, sys

          API_KEY = os.environ["OPENROUTER_API_KEY"]
          TOPIC   = os.environ["TOPIC"]
          SLIDES  = int(os.environ.get("SLIDES", "8"))
          LANG    = os.environ.get("LANG", "russian")

          def ask(model, system, user, temperature=0.85, max_tokens=2000):
              payload = json.dumps({
                  "model": model,
                  "temperature": temperature,
                  "max_tokens": max_tokens,
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user}
                  ]
              }).encode()
              req = urllib.request.Request(
                  "https://openrouter.ai/api/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                      "HTTP-Referer": "https://github.com/cheusovn/instagram-mcp",
                      "X-Title": "ContentFactory"
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=90) as r:
                      resp = json.loads(r.read())
                      return resp["choices"][0]["message"]["content"]
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"HTTP {e.code}: {body}")
                  raise

          LANG_HINT = "на русском языке" if LANG == "russian" else "in English"
          # Reliable models on OpenRouter:
          MODEL_SMART = "openai/gpt-4o"
          MODEL_FAST  = "openai/gpt-4o-mini"

          print("═" * 60)
          print("  🏭 КОНТЕНТ-ЗАВОД: ГЕНЕРАЦИЯ ВИРУСНОЙ КАРУСЕЛИ")
          print("═" * 60)
          print(f"  Тема: {TOPIC}")
          print(f"  Слайдов: {SLIDES}")
          print()

          # ── АГЕНТ 1: Маркетолог ──────────────────────────────────
          print("🎯 [АГЕНТ 1] Маркетинговый стратег...")
          INSIGHTS = """
          Данные о конкурентах (русскоязычная ниша ИИ, июнь 2026):
          - Лучший паттерн: «Напиши СЛОВО — пришлю бонус» → 1200+ комментариев
          - Топ хэштег: #sora (весь топ-10 каруселей)
          - Средний топ: 3041 лайков, 347 комментариев
          - Лучшее время: 19:00-21:00 МСК
          - Формула: триггерный хук → ценность → CTA написать слово
          """
          strat = ask(
              MODEL_SMART,
              f"Ты топовый маркетолог Instagram в нише ИИ/нейросетей. Пишешь {LANG_HINT}.",
              f"""Тема: "{TOPIC}"

{INSIGHTS}

Дай стратегию для карусели ({SLIDES} слайдов) {LANG_HINT}:
1. ГЛАВНЫЙ ХУК (слайд 1, ≤8 слов, шок/польза/интрига)
2. ОБЕЩАНИЕ ЦЕННОСТИ (что узнает читатель)
3. ЦЕЛЕВАЯ АУДИТОРИЯ
4. ПСИХОЛОГИЧЕСКИЙ ТРИГГЕР (почему остановятся)
5. CTA (конкретное слово в комментах + что получат)
6. 5 ХЭШТЕГОВ для ниши"""
          )
          print("  ✅ Стратегия готова")
          print()

          # ── АГЕНТ 2: Психолог/структура слайдов ─────────────────
          print("🧠 [АГЕНТ 2] Психолог создаёт крючки для слайдов...")
          psych = ask(
              MODEL_SMART,
              f"Ты специалист по поведенческой психологии и вирусному контенту. Пишешь {LANG_HINT}.",
              f"""Тема: "{TOPIC}"

Стратегия от маркетолога:
{strat}

Создай структуру {SLIDES} слайдов с психологическими крючками {LANG_HINT}.
Для каждого слайда укажи:
- СЛАЙД N: [заголовок/текст, ≤10 слов]
- Психологический механизм: [gap/FOMO/social proof/authority/curiosity]
- Подзаголовок/тело (2-3 строки)
- Переходная фраза к следующему слайду

Слайд 1 = ВЗРЫВ ВНИМАНИЯ (стоп-скролл)
Слайды 2-{SLIDES-1} = нарастающая ценность
Слайд {SLIDES} = мощный CTA (конкретное слово в комментах)"""
          )
          print("  ✅ Психологические крючки готовы")
          print()

          # ── АГЕНТ 3: UX/UI дизайнер ──────────────────────────────
          print("🎨 [АГЕНТ 3] UX/UI дизайнер прорабатывает визуал...")
          design = ask(
              MODEL_FAST,
              f"Ты топовый UX/UI дизайнер Instagram каруселей. Пишешь {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
Структура слайдов:
{psych}

Создай полный дизайн-бриф {LANG_HINT}:

ОБЩИЙ СТИЛЬ:
- Цветовая палитра (hex коды, 3-4 цвета)
- Шрифт (название + вес)
- Визуальный настрой (dark/light, cinematic/minimal/bold)
- Размер: 1080x1350px portrait

ДЛЯ КАЖДОГО СЛАЙДА:
- Фон: [описание/цвет/текстура]
- Текст: [позиция, размер, цвет]
- Главный элемент: [иконка/скриншот/абстракция]
- Image prompt для DALL-E/Midjourney (на английском, ultra HD, Instagram portrait 1080x1350):
  «[детальный промпт]»"""
          )
          print("  ✅ Дизайн-бриф готов")
          print()

          # ── АГЕНТ 4: Копирайтер ───────────────────────────────────
          print("✍️  [АГЕНТ 4] Копирайтер пишет финальные тексты...")
          copy = ask(
              MODEL_SMART,
              f"Ты топовый копирайтер Instagram. Пишешь {LANG_HINT}. Стиль: энергичный, без воды, с эмодзи где уместно.",
              f"""Тема: "{TOPIC}"

Психологическая структура слайдов:
{psych}

Напиши ФИНАЛЬНЫЕ ТЕКСТЫ для каждого слайда {LANG_HINT}:

СЛАЙД 1 (ОБЛОЖКА):
[Главный заголовок — 1 строка, ≤8 слов, стоп-скролл]

СЛАЙДЫ 2-{SLIDES-1} (КОНТЕНТ):
[Заголовок слайда — ≤8 слов]
[Текст — 2-3 строки с конкретикой]

СЛАЙД {SLIDES} (CTA):
[Призыв — конкретное слово в комментах]
[Что получит человек]

CAPTION ДЛЯ ПОСТА:
[Первые 2-3 строки — хук перед «ещё»]
[Полный текст — история/ценность]
[CTA]
[Хэштеги]

Используй паттерн «Напиши [СЛОВО] в комментариях — пришлю [ЦЕННОСТЬ]»."""
          )
          print("  ✅ Тексты готовы")
          print()

          # ── ФИНАЛЬНЫЙ ОТЧЁТ ──────────────────────────────────────
          print("═" * 60)
          print("  📋 ИТОГОВЫЙ БРИФ ДЛЯ ПРОДАКШЕНА")
          print("═" * 60)
          print()
          print("━━━ 🎯 МАРКЕТИНГОВАЯ СТРАТЕГИЯ ━━━")
          print(strat)
          print()
          print("━━━ 🧠 ПСИХОЛОГИЧЕСКАЯ СТРУКТУРА СЛАЙДОВ ━━━")
          print(psych)
          print()
          print("━━━ 🎨 ДИЗАЙН-БРИФ + ПРОМПТЫ ДЛЯ ИЗОБРАЖЕНИЙ ━━━")
          print(design)
          print()
          print("━━━ ✍️  ФИНАЛЬНЫЕ ТЕКСТЫ + CAPTION ━━━")
          print(copy)
          print()
          print("═" * 60)
          print("  ✅ КАРУСЕЛЬ ГОТОВА К ПРОДАКШЕНУ")
          print(f"  Следующий шаг: создай {SLIDES} слайдов в Canva/Figma")
          print("  используя дизайн-бриф и промпты выше.")
          print("  Публикуй в 19:00-21:00 по МСК (пик активности).")
          print("═" * 60)
          PYEOF
