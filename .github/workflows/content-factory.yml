name: Content Factory — Viral Carousel Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Тема карусели'
        required: true
        default: 'топ-5 нейросетей для создания видео в 2026'
      slides:
        description: 'Количество слайдов (7-10)'
        required: false
        default: '8'
      telegram_link:
        description: 'Ссылка на Telegram-канал (https://t.me/...)'
        required: false
        default: 'https://t.me/nikolay_cheusov'
      language:
        description: 'Язык контента'
        required: false
        default: 'russian'
        type: choice
        options:
          - russian
          - english

jobs:
  generate-carousel:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TOPIC: ${{ inputs.topic }}
      SLIDES: ${{ inputs.slides }}
      LANG: ${{ inputs.language }}
      TG_LINK: ${{ inputs.telegram_link }}

    steps:
      - name: "🏭 Content Factory — Multi-Agent Carousel"
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          API_KEY  = os.environ["OPENROUTER_API_KEY"]
          TOPIC    = os.environ["TOPIC"]
          SLIDES   = int(os.environ.get("SLIDES", "8"))
          LANG     = os.environ.get("LANG", "russian")
          TG_LINK  = os.environ.get("TG_LINK", "https://t.me/nikolay_cheusov")
          MODEL    = "google/gemini-3.1-flash-image-preview"

          # Ссылка без https:// для упоминания в посте
          TG_SHORT = TG_LINK.replace("https://", "")

          def ask(system, user, temperature=0.85, max_tokens=2500):
              payload = json.dumps({
                  "model": MODEL,
                  "temperature": temperature,
                  "max_tokens": max_tokens,
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user}
                  ]
              }).encode()
              req = urllib.request.Request(
                  "https://openrouter.ai/api/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                      "HTTP-Referer": "https://github.com/cheusovn/instagram-mcp",
                      "X-Title": "ContentFactory"
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=90) as r:
                      return json.loads(r.read())["choices"][0]["message"]["content"]
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"  ❌ HTTP {e.code}: {body[:400]}")
                  raise

          LANG_HINT = "на русском языке" if LANG == "russian" else "in English"

          # Фиксированный CTA-блок для последнего слайда и caption
          TG_CTA_SLIDE = f"""Последний слайд {SLIDES} является призывом подписаться на закрытый Telegram-канал.
          Текст этого слайда должен быть:
          - Заголовок: "Хочешь ещё больше?"
          - Подзаголовок: "У меня есть закрытый Telegram — там я делюшь ежедневными фишками про ИИ:»
          - Максимально 2-3 пункта что там есть ("... промпты", "... разборы инструментов", "... кейсы")
          - Призыв: "Подписывайся — это бесплатно"
          - Ссылка в био или подпись: {TG_SHORT}
          """

          TG_CTA_CAPTION = f"""
          И в конце caption обязательно добавь:
          "⬇️ Больше такого — в моём закрытом Telegram: {TG_SHORT}
          Там бесплатно. Ежедневные фишки, промпты и разборы ИИ-инструментов."
          """

          INSIGHTS = """
          Данные о конкурентах (русскоязычная ниша ИИ, июнь 2026):
          - Лучший паттерн: «Напиши СЛОВО — пришлю бонус» → 1200+ комментариев
          - Топ хэштег: #sora (весь топ-10 каруселей)
          - Средний топ: 3041 лайков, 347 комментариев
          - Лучшее время: 19:00-21:00 МСК
          - Формула: триггерный хук → ценность → CTA
          """

          print("═" * 60)
          print("  🏭 КОНТЕНТ-ЗАВОД: ГЕНЕРАЦИЯ ВИРУСНОЙ КАРУСЕЛИ")
          print(f"  Модель: {MODEL}")
          print("═" * 60)
          print(f"  Тема:    {TOPIC}")
          print(f"  Слайдов:  {SLIDES}")
          print(f"  Telegram: {TG_LINK}")
          print()

          # ── АГЕНТ 1: Маркетолог ───────────────────────────────
          print("🎯 [АГЕНТ 1] Маркетинговый стратег...")
          strat = ask(
              f"Ты топовый маркетолог Instagram в нише ИИ/нейросетей. Пишешь {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
{INSIGHTS}
Дай стратегию для карусели ({SLIDES} слайдов) {LANG_HINT}:
1. ГЛАВНЫЙ ХУК (слайд 1, ≤8 слов, шок/польза/интрига)
2. ОБЕЩАНИЕ ЦЕННОСТИ (что узнает читатель)
3. ЦЕЛЕВАЯ АУДИТОРИЯ
4. ПСИХОЛОГИЧЕСКИЙ ТРИГГЕР
5. CTA СЛОВО (конкретное слово в комментах + что получат)
6. 5 ХЭШТЕГОВ
ВАЖНО: последний слайд ВСЕГДА ведёт в Telegram {TG_LINK}"""
          )
          print("  ✅ Стратегия готова")
          print()

          # ── АГЕНТ 2: Психолог ──────────────────────────────────
          print("🧠 [АГЕНТ 2] Психолог создаёт крючки...")
          psych = ask(
              f"Ты специалист по поведенческой психологии и вирусному контенту. Пишешь {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
Стратегия: {strat}

Создай структуру {SLIDES} слайдов {LANG_HINT}.
Для каждого слайда (1..{SLIDES-1}):
- СЛАЙД N: [заголовок, ≤10 слов]
- Психологический механизм: [gap/FOMO/social proof/authority/curiosity]
- Подзаголовок/тело (2-3 строки)
- Переходная фраза к следующему слайду

СЛАЙД {SLIDES} = ПОДПИСКА НА TELEGRAM:
{TG_CTA_SLIDE}

Слайд 1 = взрыв внимания
Слайды 2-{SLIDES-1} = нарастающая ценность
Слайд {SLIDES} = Telegram CTA"""
          )
          print("  ✅ Психологические крючки готовы")
          print()

          # ── АГЕНТ 3: UX/UI дизайнер ─────────────────────────────
          print("🎨 [АГЕНТ 3] UX/UI дизайнер...")
          design = ask(
              f"Ты топовый UX/UI дизайнер Instagram каруселей. Тренды 2026: dark+neon, glassmorphism, bold type. Пишешь {LANG_HINT}.",
              f"""Тема: "{TOPIC}"
Структура слайдов: {psych}

Создай дизайн-бриф {LANG_HINT}:

ОБЩИЙ СТИЛЬ:
- Цветовая палитра (hex)
- Шрифт (название + вес)
- Визуальный настрой (dark/neon/minimal)
- Размер: 1080x1350px portrait

ДЛЯ КАЖДОГО СЛАЙДА:
- Фон
- Текст (позиция, размер, цвет)
- Главный элемент
- Image prompt для DALL-E/Midjourney (English, 1080x1350 portrait):
  «[prompt]»

СЛАЙД {SLIDES} (последний) — Telegram CTA:
- Фон: тёмный с логотипом Telegram (синий цвет #2AABEE)
- Текст центр: большая ссылка {TG_SHORT}
- Иконка Telegram сверху + CTA-текст
- Image prompt: "dark cinematic background, glowing blue Telegram logo centered, bold white text '{TG_SHORT}', call to action, Instagram portrait 1080x1350, professional, premium"""
          )
          print("  ✅ Дизайн-бриф готов")
          print()

          # ── АГЕНТ 4: Копирайтер ───────────────────────────────
          print("✍️  [АГЕНТ 4] Копирайтер...")
          copy = ask(
              f"Ты топовый копирайтер Instagram. {LANG_HINT}. Энергичный, без воды, с эмодзи где уместно.",
              f"""Тема: "{TOPIC}"
Структура: {psych}

Напиши ФИНАЛЬНЫЕ ТЕКСТЫ {LANG_HINT}:

СЛАЙД 1 (ОБЛОЖКА): [заголовок 1 строка, ≤8 слов, стоп-скролл]

СЛАЙДЫ 2-{SLIDES-1}: [Заголовок] + [Текст 2-3 строки с конкретикой]

СЛАЙД {SLIDES} (TELEGRAM CTA):
"Хочешь ещё больше?"
"У меня есть закрытый Telegram — там бесплатно:"
"• ежедневные фишки и промпты"
"• разборы ИИ-инструментов"
"• кейсы + шаблоны"
"→ Подписывайся — {TG_SHORT}"

CAPTION ДЛЯ ПОСТА:
[хук 2-3 строки] + [текст с ценностью] + [CTA написать слово] + [хэштеги] +
{TG_CTA_CAPTION}"""
          )
          print("  ✅ Тексты готовы")
          print()

          # ── ФИНАЛЬНЫЙ ОТЧЁТ ──────────────────────────────────
          print("═" * 60)
          print("  📋 ИТОГОВЫЙ БРИФ")
          print("═" * 60)
          print()
          print("━" * 60)
          print("🎯 МАРКЕТИНГОВАЯ СТРАТЕГИЯ")
          print("━" * 60)
          print(strat)
          print()
          print("━" * 60)
          print("🧠 ПСИХОЛОГИЧЕСКАЯ СТРУКТУРА СЛАЙДОВ")
          print("━" * 60)
          print(psych)
          print()
          print("━" * 60)
          print("🎨 ДИЗАЙН-БРИФ + ПРОМПТЫ ДЛЯ ИЗОБРАЖЕНИЙ")
          print("━" * 60)
          print(design)
          print()
          print("━" * 60)
          print("✍️  ФИНАЛЬНЫЕ ТЕКСТЫ + CAPTION")
          print("━" * 60)
          print(copy)
          print()
          print("═" * 60)
          print(f"  ✅ КАРУСЕЛЬ ГОТОВА")
          print(f"  Создай {SLIDES} слайдов в Canva/Figma по дизайн-брифу.")
          print(f"  Последний слайд = Telegram CTA: {TG_LINK}")
          print("  Публикуй в 19:00-21:00 МСК.")
          print("═" * 60)
          PYEOF
