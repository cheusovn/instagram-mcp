name: Instagram Account Stats

on:
  workflow_dispatch:
    inputs:
      period:
        description: 'Period for insights'
        required: false
        default: 'day'
        type: choice
        options:
          - day
          - week
          - month

jobs:
  get-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Get Instagram Account Info
        run: |
          echo "📊 Fetching Instagram account info..."
          RESPONSE=$(curl -s "https://graph.instagram.com/me?fields=id,username,account_type,media_count&access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if 'error' in data:
              print('❌ Error:', data['error']['message'])
              sys.exit(1)
          print('✅ Account Info:')
          print(f\"  Username:     @{data.get('username', 'N/A')}\")
          print(f\"  Account Type: {data.get('account_type', 'N/A')}\")
          print(f\"  Media Count:  {data.get('media_count', 'N/A')} posts\")
          print(f\"  Account ID:   {data.get('id', 'N/A')}\")
          "

      - name: Get Recent Media
        run: |
          echo ""
          echo "📸 Fetching recent posts..."
          RESPONSE=$(curl -s "https://graph.instagram.com/me/media?fields=id,caption,media_type,timestamp,like_count,comments_count&limit=5&access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if 'error' in data:
              print('❌ Error:', data['error']['message'])
              sys.exit(0)
          posts = data.get('data', [])
          if not posts:
              print('No posts found')
              sys.exit(0)
          print(f'✅ Last {len(posts)} posts:')
          for i, post in enumerate(posts, 1):
              caption = post.get('caption', '')[:50] + '...' if post.get('caption', '') and len(post.get('caption','')) > 50 else post.get('caption', 'No caption')
              print(f\"  {i}. [{post.get('media_type','?')}] {caption}\")
              print(f\"     ❤️  {post.get('like_count', 'N/A')} likes  💬 {post.get('comments_count', 'N/A')} comments\")
              print(f\"     📅 {post.get('timestamp', 'N/A')[:10]}\")
          "
