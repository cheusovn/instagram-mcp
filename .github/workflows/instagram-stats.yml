name: Instagram Account Stats

on:
  workflow_dispatch:

jobs:
  get-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Full Instagram Statistics
        run: |
          TOKEN="${{ secrets.INSTAGRAM_ACCESS_TOKEN }}"

          # Get page token and IG ID
          PAGES=$(curl -s "https://graph.facebook.com/me/accounts?access_token=$TOKEN")
          if ! echo "$PAGES" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('data') else 1)" 2>/dev/null; then
            echo "❌ Facebook Graph API не вернул список страниц (нет поля 'data')."
            echo "── Ответ API ──"
            echo "$PAGES"
            echo "───────────────"
            echo "Чаще всего это значит, что INSTAGRAM_ACCESS_TOKEN истёк или потерял права."
            echo "Обнови секрет репозитория INSTAGRAM_ACCESS_TOKEN — см. AUTHENTICATION_GUIDE.md."
            exit 1
          fi
          PAGE_TOKEN=$(echo "$PAGES" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data'][0]['access_token'])")
          PAGE_ID=$(echo "$PAGES" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data'][0]['id'])")
          IG_ID=$(curl -s "https://graph.facebook.com/$PAGE_ID?fields=instagram_business_account&access_token=$PAGE_TOKEN" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('instagram_business_account',{}).get('id',''))")
          if [ -z "$IG_ID" ]; then
            echo "❌ У страницы не привязан Instagram Business аккаунт (instagram_business_account пуст)."
            exit 1
          fi

          echo "════════════════════════════════════════"
          echo "         📱 INSTAGRAM FULL STATS"
          echo "════════════════════════════════════════"

          # 1. Account Info
          echo ""
          echo "👤 ПРОФИЛЬ"
          echo "──────────────────────────────────────"
          curl -s "https://graph.facebook.com/$IG_ID?fields=username,name,biography,followers_count,follows_count,media_count,website&access_token=$PAGE_TOKEN" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f\"  Аккаунт:     @{d.get('username','N/A')}\")
          print(f\"  Имя:         {d.get('name','N/A')}\")
          print(f\"  Подписчики:  {d.get('followers_count',0):,}\")
          print(f\"  Подписки:    {d.get('follows_count',0):,}\")
          print(f\"  Постов:      {d.get('media_count',0):,}\")
          print(f\"  Сайт:        {d.get('website','N/A')}\")
          print(f\"  Биография:   {d.get('biography','N/A')[:80]}\")
          "

          # 2. Insights - last 30 days
          echo ""
          echo "📊 МЕТРИКИ ЗА 30 ДНЕЙ"
          echo "──────────────────────────────────────"
          curl -s "https://graph.facebook.com/$IG_ID/insights?metric=reach,impressions,profile_views,website_clicks,follower_count&period=days_28&access_token=$PAGE_TOKEN" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
              print('  ⚠️ Insights недоступны:', d['error']['message'])
              sys.exit(0)
          labels = {
              'reach': '👁  Охват (уникальные)',
              'impressions': '📺 Показы (всего)',
              'profile_views': '🔍 Просмотры профиля',
              'website_clicks': '🔗 Клики по ссылке',
              'follower_count': '👥 Прирост подписчиков',
          }
          for item in d.get('data', []):
              name = item.get('name','')
              values = item.get('values', [])
              total = sum(v.get('value',0) for v in values)
              label = labels.get(name, name)
              print(f\"  {label}: {total:,}\")
          "

          # 3. Audience insights
          echo ""
          echo "🌍 АУДИТОРИЯ"
          echo "──────────────────────────────────────"
          curl -s "https://graph.facebook.com/$IG_ID/insights?metric=audience_country,audience_city,audience_gender_age&period=lifetime&access_token=$PAGE_TOKEN" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'error' in d:
              print('  ⚠️ Данные аудитории недоступны')
              sys.exit(0)
          for item in d.get('data', []):
              name = item.get('name','')
              values = item.get('values', [{}])
              val = values[-1].get('value', {}) if values else {}
              if name == 'audience_country' and val:
                  print('  Топ страны:')
                  sorted_countries = sorted(val.items(), key=lambda x: x[1], reverse=True)[:5]
                  for country, count in sorted_countries:
                      print(f\"    {country}: {count:,}\")
              elif name == 'audience_gender_age' and val:
                  print('  Пол и возраст:')
                  for key, count in sorted(val.items(), key=lambda x: x[1], reverse=True)[:8]:
                      print(f\"    {key}: {count:,}\")
          "

          # 4. Last 10 posts with engagement
          echo ""
          echo "📸 ПОСЛЕДНИЕ 10 ПОСТОВ"
          echo "──────────────────────────────────────"
          curl -s "https://graph.facebook.com/$IG_ID/media?fields=id,caption,media_type,timestamp,like_count,comments_count,reach,impressions,saved,permalink&limit=10&access_token=$PAGE_TOKEN" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          posts = d.get('data', [])
          total_likes = 0
          total_comments = 0
          for i, post in enumerate(posts, 1):
              caption = post.get('caption','') or ''
              short = (caption[:55]+'...') if len(caption)>55 else caption or 'Без подписи'
              likes = post.get('like_count', 0)
              comments = post.get('comments_count', 0)
              saved = post.get('saved', '?')
              reach = post.get('reach', '?')
              total_likes += likes
              total_comments += comments
              date = post.get('timestamp','')[:10]
              mtype = post.get('media_type','?')
              icon = {'IMAGE':'🖼 ', 'VIDEO':'🎬', 'CAROUSEL_ALBUM':'📑'}.get(mtype, '?')
              print(f\"  {i:2}. {icon} {date}\")
              print(f\"      {short}\")
              print(f\"      ❤️ {likes}  💬 {comments}  🔖 {saved}  👁 {reach}\")
              print()
          if posts:
              avg_likes = total_likes / len(posts)
              avg_comments = total_comments / len(posts)
              print(f\"  📈 Среднее на пост: ❤️ {avg_likes:.1f} лайков  💬 {avg_comments:.1f} комментариев\")
          "

          # 5. Best post
          echo ""
          echo "🏆 ЛУЧШИЙ ПОСТ (по лайкам)"
          echo "──────────────────────────────────────"
          curl -s "https://graph.facebook.com/$IG_ID/media?fields=id,caption,media_type,timestamp,like_count,comments_count,permalink&limit=50&access_token=$PAGE_TOKEN" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          posts = d.get('data', [])
          if not posts:
              print('  Нет данных')
              sys.exit(0)
          best = max(posts, key=lambda x: x.get('like_count', 0))
          caption = best.get('caption','') or ''
          short = (caption[:80]+'...') if len(caption)>80 else caption or 'Без подписи'
          print(f\"  ❤️  {best.get('like_count',0)} лайков  💬 {best.get('comments_count',0)} комментариев\")
          print(f\"  📅 {best.get('timestamp','')[:10]}\")
          print(f\"  📝 {short}\")
          print(f\"  🔗 {best.get('permalink','')}\")
          "

          echo ""
          echo "════════════════════════════════════════"
