name: Instagram Account Stats

on:
  workflow_dispatch:

jobs:
  get-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check Token & Get Account Info
        run: |
          echo "🔍 Testing token with Instagram Basic Display API..."
          RESPONSE=$(curl -s "https://graph.instagram.com/me?fields=id,username,account_type,media_count&access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Raw response: $RESPONSE"
          echo ""
          echo "🔍 Testing with Facebook Graph API..."
          RESPONSE2=$(curl -s "https://graph.facebook.com/me?fields=id,name&access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Raw response: $RESPONSE2"
          echo ""
          echo "🔍 Checking token info..."
          RESPONSE3=$(curl -s "https://graph.facebook.com/debug_token?input_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}&access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Token debug: $RESPONSE3"
