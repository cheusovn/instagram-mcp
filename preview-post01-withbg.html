  const cols = ['#CCFF00','#FF00FF','#00FFFF','#fff'];
  return Array.from({length:n}, (_,i) => {
    const c = cols[i%4], x=5+Math.random()*90, y=5+Math.random()*90;
    const s=1.5+Math.random()*4, dur=2+Math.random()*3, del=Math.random()*2.5;
    return `<div class="pt" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;background:${c};box-shadow:0 0 ${s*3}px ${c};animation-duration:${dur}s;animation-delay:${del}s"></div>`;
  }).join('');
}

const grid = document.getElementById('grid');

slides.forEach((s, i) => {
  const idx = i+1;
  const prog = idx/TOTAL;
  const div = document.createElement('div');
  div.className = 'slide';

  if (s.isLast) {
    div.innerHTML = `
      <div class="bg bg-${idx}"></div>
      <div class="bg-overlay"></div>
      <div class="neon-grid"></div>
      <div class="pts">${pts(12)}</div>
      <div class="scanline"></div>
      <div class="corner c-tl"></div><div class="corner c-tr"></div>
      <div class="corner c-bl"></div><div class="corner c-br"></div>
      <div class="slash"></div>
      <div class="ai-label">Gemini AI BG</div>
      <div class="cta-wrap">
        <div class="cta-card">
          <div class="cta-tg">✈️</div>
          <div class="cta-title">ВЕСЬ МОЙ ИИ-СТЕК —<br><span>В МОЁМ TELEGRAM</span></div>
          <div class="cta-sub">ССЫЛКА В ШАПКЕ ПРОФИЛЯ ↓</div>
        </div>
        <div class="ig-row">
          <div class="ig-av">Н</div>
          <div>
            <div class="ig-nm">@nikolay_cheusov</div>
            <div class="ig-sub">Нейросети · ИИ · Заработок</div>
          </div>
          <button class="ig-btn">FOLLOW</button>
        </div>
      </div>
      <div class="prog"><div class="prog-fill" style="width:100%"></div></div>
    `;
  } else {
    const words = s.headline.split(' ');
    const KEYS = ['нейросетей','команду','ChatGPT','Midjourney','HeyGen','ElevenLabs','Perplexity','Sora','математика','Telegram'];
    const headHTML = words.map(w => {
      const isK = KEYS.some(k => w.toLowerCase().includes(k.toLowerCase()));
      return isK ? `<span class="kw">${w}</span> ` : w+' ';
    }).join('');

    div.innerHTML = `
      <div class="bg bg-${idx}"></div>
      <div class="bg-overlay"></div>
      <div class="neon-grid"></div>
      <div class="pts">${pts(16)}</div>
      <div class="scanline"></div>
      <div class="corner c-tl"></div><div class="corner c-tr"></div>
      <div class="corner c-bl"></div><div class="corner c-br"></div>
      <div class="slash"></div>
      <div class="ai-label">Gemini AI BG</div>
      <div class="content">
        <div class="hdr">
          <span class="hdr-brand">@nikolay_cheusov</span>
          <div class="hdr-bar"><div class="hdr-fill" style="width:${prog*100}%"></div></div>
          <span class="hdr-num">${idx}/${TOTAL}</span>
        </div>
        <div class="kicker" style="--ac:${s.kc}">${s.kicker}</div>
        <div class="emoji-box">${s.emoji}</div>
        <div class="headline">${headHTML}</div>
        <div class="body-card">
          <div class="body-text"><span class="body-prefix">▶ </span>${s.body}</div>
        </div>
        <div class="tags">
          <div class="tag">
            <div class="tag-l">СЛАЙД</div>
            <div class="tag-v">${idx}/${TOTAL}</div>
          </div>
          <div class="tag tag-m">
            <div class="tag-l">2026</div>
            <div class="tag-v">AI↑</div>
          </div>
          <div class="tag-h">
            <span>@nikolay_cheusov</span>
          </div>
        </div>
      </div>
      <div class="prog"><div class="prog-fill" style="width:${prog*100}%"></div></div>
    `;
  }

  grid.appendChild(div);
});
</script>
</body>
</html>
